name: Scratch diag - /info live smoke test (preview + prod)
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check preview deploy + production driverlog.link
        shell: bash
        run: |
          set +e
          PREVIEW="https://driver-log-git-claude-driverlo-9fa668-kritkritth-4743s-projects.vercel.app"
          echo "=== PREVIEW: /info/ ==="
          curl -sS -D - -o /tmp/p1.html --max-time 10 "$PREVIEW/info/"; echo "exit: $?"
          echo "=== PREVIEW: /info/guides/ ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "$PREVIEW/info/guides/"
          echo "=== PREVIEW: /info/guides/calculate-profit.html ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "$PREVIEW/info/guides/calculate-profit.html"
          echo "=== PREVIEW: /info/guides/fuel-saving-tips.html ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "$PREVIEW/info/guides/fuel-saving-tips.html"
          echo "=== PREVIEW: /info/guides/choosing-app.html ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "$PREVIEW/info/guides/choosing-app.html"
          echo "=== PREVIEW: /info/brand/favicon-64.png ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "$PREVIEW/info/brand/favicon-64.png"
          echo "=== PREVIEW: /info/ds-base.js ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "$PREVIEW/info/ds-base.js"
          echo "=== PREVIEW: unaffected routes / and /app ==="
          curl -sS -o /dev/null -w "/ -> HTTP %{http_code}\n" --max-time 10 "$PREVIEW/"
          curl -sS -o /dev/null -w "/app -> HTTP %{http_code}\n" --max-time 10 "$PREVIEW/app"
          echo ""
          echo "=== PROD (pre-merge baseline): driverlog.link/info/ ==="
          curl -sS -D - -o /dev/null --max-time 10 "https://driverlog.link/info/"; echo "exit: $?"
          echo "=== PROD: old subdomain info.driverlog.link/ (expect still broken) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "https://info.driverlog.link/"; echo "exit: $?"
