name: Scratch diag - LINE login config check
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check /api/line-login-start
        shell: bash
        run: |
          set +e
          curl -sS -D - -o /tmp/body.txt --max-time 10 "https://driverlog.link/api/line-login-start"
          echo "curl exit: $?"
          echo "--- body ---"
          cat /tmp/body.txt; echo
