name: Scratch diag - info subdomain status
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check info.driverlog.link DNS
        run: |
          echo "=== dig info.driverlog.link CNAME (default) ==="
          dig +short info.driverlog.link CNAME || true
          echo "=== dig via Google 8.8.8.8 ==="
          dig +short info.driverlog.link @8.8.8.8 || true
          echo "=== dig via Cloudflare 1.1.1.1 ==="
          dig +short info.driverlog.link @1.1.1.1 || true
          echo "=== direct against authoritative ns1/ns2.dns-parking.com ==="
          dig +short info.driverlog.link CNAME @ns1.dns-parking.com || true
          dig +short info.driverlog.link CNAME @ns2.dns-parking.com || true
          echo "=== SOA serial (compare to prior: 2026071708) ==="
          dig +short info.driverlog.link SOA @ns1.dns-parking.com || true
