name: Check driverlog.link/app status
on:
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check driverlog.link paths
        run: |
          echo "--- driverlog.link/app ---"
          curl -s -o /dev/null -w 'code=%{http_code} final_url=%{url_effective}\n' --max-time 20 https://driverlog.link/app
          curl -sI --max-time 20 https://driverlog.link/app | head -15
          echo
          echo "--- driverlog.link/app.html ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/app.html
          echo
          echo "--- driverlog.link/ ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/
          echo
          echo "--- driverlog.link/login.html ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/login.html
          echo
          echo "--- driverlog.link/app.js ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/app.js
          echo
          echo "--- driverlog.link/api/auth-me ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/api/auth-me
          echo
          echo "--- DNS ---"
          dig +short driverlog.link A
