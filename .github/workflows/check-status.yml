name: Scratch diag - driverlog.link/app 404
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check driverlog.link/app + app.html + root
        shell: bash
        run: |
          set +e
          echo "=== /app ==="
          curl -sS -D - -o /tmp/app.html --max-time 10 "https://driverlog.link/app"
          echo "exit: $?"
          echo "--- body ---"; cat /tmp/app.html; echo
          echo ""
          echo "=== /app.html (direct) ==="
          curl -sS -D - -o /tmp/apphtml.html --max-time 10 "https://driverlog.link/app.html"
          echo "exit: $?"
          echo "--- body head ---"; head -c 300 /tmp/apphtml.html; echo
          echo ""
          echo "=== / (root) ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "https://driverlog.link/"
          echo "=== /login ==="
          curl -sS -D - -o /dev/null --max-time 10 "https://driverlog.link/login"
          echo "=== /login.html ==="
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" --max-time 10 "https://driverlog.link/login.html"
