name: Scratch check live status 3
on:
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: DNS + HTTP check
        run: |
          echo "=== DNS resolution ==="
          echo "--- driverlog.link ---"
          getent hosts driverlog.link || true
          dig +short driverlog.link A || true
          dig +short driverlog.link CNAME || true
          echo "--- info.driverlog.link ---"
          getent hosts info.driverlog.link || true
          dig +short info.driverlog.link A || true
          dig +short info.driverlog.link CNAME || true
          echo "=== HTTP ==="
          echo "--- driverlog.link/ ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/ || true
          curl -sI --max-time 20 https://driverlog.link/ | head -20 || true
          echo "--- info.driverlog.link/ ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://info.driverlog.link/ || true
          curl -sI --max-time 20 https://info.driverlog.link/ | head -20 || true
