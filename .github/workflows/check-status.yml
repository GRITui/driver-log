name: Smoke test /app and /login redirects
on:
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check redirects
        run: |
          echo "--- driverlog.link/app ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/app
          curl -sI --max-time 20 https://driverlog.link/app | grep -i "^location\|^HTTP"
          echo
          echo "--- driverlog.link/app (follow redirect) ---"
          curl -s -o /dev/null -w 'final_code=%{http_code} final_url=%{url_effective}\n' -L --max-time 20 https://driverlog.link/app
          echo
          echo "--- driverlog.link/login ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/login
          curl -sI --max-time 20 https://driverlog.link/login | grep -i "^location\|^HTTP"
          echo
          echo "--- driverlog.link/login (follow redirect) ---"
          curl -s -o /dev/null -w 'final_code=%{http_code} final_url=%{url_effective}\n' -L --max-time 20 https://driverlog.link/login
          echo
          echo "--- info.driverlog.link/ unaffected ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://info.driverlog.link/
