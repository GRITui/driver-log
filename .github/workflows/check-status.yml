name: Scratch diag - deploy version check
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check production version matches latest commit
        run: |
          echo "=== driverlog.link/app.html - grep app-version ==="
          curl -sS "https://driverlog.link/app.html" | grep -o 'id="app-version"[^<]*<[^>]*>[0-9.]*' || true
          curl -sS "https://driverlog.link/app.html" | grep -A1 'id="app-version"' | head -3
          echo ""
          echo "=== driverlog.link/app.js - grep APP_VERSION ==="
          curl -sS "https://driverlog.link/app.js" | grep -o "APP_VERSION = '[0-9.]*'" | head -1
          echo ""
          echo "=== driverlog.link/sw.js - grep SW_VERSION ==="
          curl -sS "https://driverlog.link/sw.js" | grep -o "SW_VERSION = '[a-z0-9.]*'" | head -1
          echo ""
          echo "=== response headers for last-modified/date ==="
          curl -sS -D - -o /dev/null "https://driverlog.link/app.js" | grep -iE "last-modified|x-vercel-id|etag"
