name: Scratch diag - info 403 check
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check info.driverlog.link current response + DNS
        run: |
          echo "=== full response ==="
          curl -sS -D - -o /tmp/info.html "https://info.driverlog.link/"
          echo "--- body ---"; cat /tmp/info.html
          echo ""
          echo "=== dig A (default) ==="
          dig +short info.driverlog.link A || true
          echo "=== dig CNAME (default) ==="
          dig +short info.driverlog.link CNAME || true
          echo "=== dig via Google 8.8.8.8 ==="
          dig +short info.driverlog.link @8.8.8.8 || true
          echo "=== direct against authoritative ns1/ns2.dns-parking.com ==="
          dig +short info.driverlog.link CNAME @ns1.dns-parking.com || true
          dig +short info.driverlog.link A @ns1.dns-parking.com || true
          dig +short info.driverlog.link CNAME @ns2.dns-parking.com || true
          dig +short info.driverlog.link A @ns2.dns-parking.com || true
