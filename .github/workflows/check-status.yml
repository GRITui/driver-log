name: Scratch check live status 5
on:
  workflow_dispatch: {}
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Full check
        run: |
          echo "--- driverlog.link full headers + body start ---"
          curl -s --max-time 20 https://driverlog.link/ -D - -o /tmp/body1.html
          echo "body head:"; head -c 300 /tmp/body1.html; echo
          echo
          echo "--- driverlog.link/app.html ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/app.html
          echo "--- driverlog.link/api/auth-me ---"
          curl -s -o /dev/null -w 'code=%{http_code}\n' --max-time 20 https://driverlog.link/api/auth-me
          echo
          echo "--- dig info.driverlog.link (all record types) ---"
          dig +short info.driverlog.link A
          dig +short info.driverlog.link CNAME
          dig +short info.driverlog.link
          echo
          echo "--- dig driverlog.link (all record types, for comparison) ---"
          dig +short driverlog.link A
          dig +short driverlog.link CNAME
          echo
          echo "--- info.driverlog.link retry x3 ---"
          for i in 1 2 3; do
            curl -s -o /dev/null -w "attempt $i: code=%{http_code}\n" --max-time 15 https://info.driverlog.link/ || echo "attempt $i: curl failed rc=$?"
          done
