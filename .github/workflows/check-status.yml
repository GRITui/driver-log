name: Scratch diag - nameserver check
on: workflow_dispatch
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check authoritative nameservers for driverlog.link
        run: |
          echo "=== NS records for driverlog.link ==="
          dig +short driverlog.link NS
          echo "=== SOA for driverlog.link (shows the actual authoritative primary NS) ==="
          dig +short driverlog.link SOA
          echo "=== Query info.driverlog.link directly against each NS above ==="
          for ns in $(dig +short driverlog.link NS); do
            echo "--- via $ns ---"
            dig +short info.driverlog.link CNAME @"$ns" || true
            dig +short info.driverlog.link A @"$ns" || true
          done
          echo ""
          echo "=== whois-style: trace from root ==="
          dig +trace info.driverlog.link CNAME 2>&1 | tail -30
