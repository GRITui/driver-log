name: Check status (scratch)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Curl a set of URLs and report headers
        run: |
          for url in \
            "https://driverlog.link/" \
            "https://driverlog.link/app.html" \
            "https://driverlog.link/app/" \
            "https://driverlog.link/manifest.json" \
            "https://info.driverlog.link/"
          do
            echo "===== $url ====="
            curl -s -D - -o /tmp/body -w '\nHTTP_CODE:%{http_code}\n' --max-time 20 -A "Mozilla/5.0 (compatible; DriverLogStatusCheck/1.0)" "$url" || echo "curl failed rc=$?"
            echo "--- body (first 300 bytes) ---"
            head -c 300 /tmp/body
            echo
            echo
          done
