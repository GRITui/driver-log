<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>DriverLog — Log in</title>
<meta name="description" content="Track earnings, fuel, and driving insights. Free, offline-first driver log book.">
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#D0021B">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DriverLog">
<link rel="icon" href="/icons/icon-192.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-180.png">
<link rel="stylesheet" href="/styles.css">
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

<!-- AUTH / LOGIN -->
<div class="auth active" id="s-auth">
  <div class="auth-hero">
    <div class="auth-wordmark"><svg viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DriverLog"><g transform="translate(15,19) scale(0.2226)"><rect width="512" height="512" rx="115" fill="#fff"/><path d="M 150 402 C 158 300, 250 224, 344 142 L 380 158 C 300 236, 300 318, 300 402 Z" fill="#D0021B"/><path d="M 224 400 C 234 302, 280 244, 360 156" fill="none" stroke="#fff" stroke-width="15" stroke-linecap="round" stroke-dasharray="4 34"/><circle cx="360" cy="126" r="40" fill="#D0021B"/><circle cx="360" cy="126" r="16" fill="#fff"/></g><text x="148" y="93" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="62" font-weight="700" letter-spacing="-1.5"><tspan fill="#ffffff">Driver</tspan><tspan fill="#FDECEA">Log</tspan></text></svg></div>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="setAuthMode('login')" data-i18n="login">Log in</button>
      <button class="auth-tab" id="tab-register" onclick="setAuthMode('register')" data-i18n="create_account">Create account</button>
    </div>
    <div class="auth-err" id="auth-err" role="alert" aria-atomic="true"></div>
    <div class="auth-field">
      <label for="auth-user" data-i18n="email">Email</label>
      <input type="email" id="auth-user" autocomplete="email" placeholder="you@example.com" autocapitalize="none" inputmode="email">
    </div>
    <div class="auth-field">
      <label for="auth-pass" data-i18n="password">Password</label>
      <input type="password" id="auth-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="auth-field" id="auth-firstname-wrap" style="display:none">
      <label for="auth-firstname" data-i18n="first_name">First name</label>
      <input id="auth-firstname" autocomplete="given-name" placeholder="Alex">
    </div>
    <div class="auth-field" id="auth-confirm-wrap" style="display:none">
      <label for="auth-confirm" data-i18n="confirm_password">Confirm password</label>
      <input type="password" id="auth-confirm" autocomplete="new-password" placeholder="••••••••">
    </div>
    <button class="auth-btn" id="auth-submit" onclick="submitAuth()" data-i18n="login">Log in</button>
    <button class="auth-btn line" id="auth-line" onclick="loginLine()" data-i18n="login_line">Log in with LINE</button>
    <button class="auth-btn guest" onclick="loginGuest()" data-i18n="login_guest">Login as Guest</button>
    <div class="auth-hint" id="auth-hint"><span id="auth-hint-text"></span><br><br>Created by Grit · Powered by Claude</div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script src="/app.js"></script>
<script>
bootLogin();
</script>
</body>
</html>
